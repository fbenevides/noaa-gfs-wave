name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: install-system-dependencies
        run: sudo apt-get install -y libeccodes-dev

      - name: setup-uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: install-dependencies
        run: uv sync --frozen --extra test --extra dev

      - name: lint-ruff
        run: uv run ruff check .

      - name: check-format
        run: uv run ruff format --check .

      - name: run-test
        run: uv run pytest --cov=noaa_gfs_wave --cov-fail-under=90

  lint-pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            test
            refactor
            docs
          requireScope: false
          subjectPattern: '^[a-z].*[^.]$'
          subjectPatternError: |
            PR title must start lowercase and not end in a period.
